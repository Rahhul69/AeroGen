
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  #wfWrap { position:relative; width:100%; background:#1a2f4e; font-family:monospace; border-radius:10px; overflow:hidden; }
  #scene { display:block; width:100%; }
  #panel { background:rgba(8,14,22,0.93); border-top:1px solid rgba(255,255,255,0.08); padding:10px 14px; }
  .pg { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:8px; }
  .pc { border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:5px 7px; background:rgba(255,255,255,0.03); }
  .pn { font-size:9px; color:rgba(180,200,200,0.6); letter-spacing:1px; }
  .pr { font-size:15px; color:#c8ddd8; font-weight:bold; line-height:1.1; }
  .pv { font-size:9px; color:rgba(160,185,180,0.6); }
  .pb { height:2px; background:rgba(255,255,255,0.07); border-radius:1px; margin-top:3px; overflow:hidden; }
  .pf { height:100%; border-radius:1px; background:#8aacaa; transition:width 0.4s; }
  .br { display:flex; gap:8px; align-items:center; }
  .btn { font-family:monospace; font-size:11px; font-weight:bold; letter-spacing:1px; padding:6px 14px; border:none; border-radius:5px; cursor:pointer; transition:opacity 0.2s; text-transform:uppercase; }
  .bg { background:#4a8a70; color:#e0f4ec; }
  .bg:disabled { background:#2a3a34; color:#4a6a5a; cursor:not-allowed; }
  .be { background:#8a7230; color:#f0e0b0; display:none; }
  .st { font-size:9px; color:rgba(150,180,170,0.6); flex:1; text-align:right; letter-spacing:0.5px; }
  .pw { height:2px; background:rgba(255,255,255,0.06); border-radius:1px; margin-bottom:8px; overflow:hidden; display:none; }
  .pfw { height:100%; background:#4a8a70; border-radius:1px; width:0%; transition:width 0.08s; }
</style>

<div id="wfWrap">
  <canvas id="scene" height="400"></canvas>
  <div id="panel">
    <div class="pw" id="pw"><div class="pfw" id="pfb"></div></div>
    <div class="pg" id="pg"></div>
    <div class="br">
      <button class="btn bg" id="gbtn" onclick="startSim()">Initialize &amp; Generate</button>
      <button class="btn be" id="ebtn" onclick="exportSim()">Export CSVs</button>
      <div class="st" id="st">System idle.</div>
    </div>
  </div>
</div>

<script>
const C = document.getElementById('scene');
const ctx = C.getContext('2d');
const W = 680, H = 400;
C.width = W; C.height = H;

const TURBINES = [
  { id:1, label:'T1', profile:'Baseline',     x:110, y:218, towerH:70,  bladeR:28, speed:1.8,  phase:0   },
  { id:2, label:'T2', profile:'High wind',    x:280, y:185, towerH:90,  bladeR:36, speed:4.2,  phase:1.2 },
  { id:3, label:'T3', profile:'Pitch error',  x:430, y:200, towerH:80,  bladeR:32, speed:2.6,  phase:0.5 },
  { id:4, label:'T4', profile:'Aging',        x:560, y:225, towerH:65,  bladeR:26, speed:1.4,  phase:2.1 },
  { id:5, label:'T5', profile:'Blind test',   x:185, y:260, towerH:55,  bladeR:22, speed:2.1,  phase:3.0 },
];

let angles = TURBINES.map(t => t.phase);
let running = false;
let tick = 0;
let raf;

function drawSky() {
  const g = ctx.createLinearGradient(0,0,0,H*0.62);
  g.addColorStop(0,'#0d1b2e');
  g.addColorStop(0.5,'#1a3050');
  g.addColorStop(1,'#2a4a6a');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H*0.62);

  ctx.fillStyle='rgba(255,255,255,0.55)';
  const stars=[[40,30],[90,18],[150,45],[220,12],[310,28],[380,8],[460,35],[530,15],[600,42],[640,22],[70,55],[180,60],[350,50],[490,18],[620,60],[25,70],[130,80],[260,65],[420,72],[580,38]];
  stars.forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,0.8,0,Math.PI*2); ctx.fill();
  });

  ctx.fillStyle='rgba(200,210,230,0.18)';
  ctx.beginPath(); ctx.ellipse(550,60,42,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,210,230,0.12)';
  ctx.beginPath(); ctx.ellipse(120,45,55,14,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(340,30,38,10,0,0,Math.PI*2); ctx.fill();
}

function drawHills() {
  ctx.fillStyle='#1e3d28';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(50,300,150,220,280,240);
  ctx.bezierCurveTo(380,255,450,210,540,230);
  ctx.bezierCurveTo(600,242,650,280,W,290);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#254a30';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(30,320,100,260,200,278);
  ctx.bezierCurveTo(300,295,360,250,460,268);
  ctx.bezierCurveTo(540,280,610,305,W,310);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#2e5a38';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.bezierCurveTo(80,340,180,295,300,308);
  ctx.bezierCurveTo(400,318,500,300,600,318);
  ctx.bezierCurveTo(640,325,665,335,W,330);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#3a6a42';
  ctx.fillRect(0,340,W,H-340);

  ctx.fillStyle='#2a5232';
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.lineTo(0,360);
  ctx.bezierCurveTo(100,345,200,370,300,358);
  ctx.bezierCurveTo(400,348,500,365,600,355);
  ctx.lineTo(W,360); ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
}

function drawTrees() {
  const treePositions = [
    [15,355,18,28],[38,362,12,20],[60,358,15,24],[630,350,17,26],[650,358,13,20],[668,355,14,22],
    [320,355,12,18],[340,360,10,16],[500,350,16,25],[520,358,11,17],[245,368,13,20],[265,365,10,15]
  ];
  treePositions.forEach(([tx,ty,tw,th])=>{
    ctx.fillStyle='#1e3d24';
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-tw/2,ty+th); ctx.lineTo(tx+tw/2,ty+th); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#162d1a';
    ctx.beginPath(); ctx.moveTo(tx,ty-th*0.3); ctx.lineTo(tx-tw*0.4,ty+th*0.5); ctx.lineTo(tx+tw*0.4,ty+th*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#4a3020';
    ctx.fillRect(tx-1.5,ty+th,3,6);
  });
}

function drawTurbine(t, angle) {
  const cx = t.x;
  const baseY = t.y + t.towerH;
  const hubY = t.y;
  const scale = t.bladeR / 32;

  ctx.strokeStyle='#8a9aa0'; ctx.lineWidth=3.5*scale+1.5;
  ctx.beginPath(); ctx.moveTo(cx,baseY); ctx.lineTo(cx,hubY+4); ctx.stroke();

  const bw = t.bladeR*0.22;
  for(let i=0;i<3;i++){
    const a = angle + i*(Math.PI*2/3);
    ctx.save();
    ctx.translate(cx,hubY);
    ctx.rotate(a);
    ctx.fillStyle='#b8c8cc';
    ctx.strokeStyle='#8a9aa8'; ctx.lineWidth=0.5;
    ctx.beginPath();
    ctx.ellipse(0,-t.bladeR*0.5, bw, t.bladeR, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle='#ccd8dc';
  ctx.strokeStyle='#8a9aa8'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.arc(cx,hubY,5*scale,0,Math.PI*2); ctx.fill(); ctx.stroke();

  if(running){
    const pr = t.bladeR*0.8;
    ctx.strokeStyle='rgba(80,200,160,0.15)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,hubY,pr,0,Math.PI*2); ctx.stroke();
  }

  ctx.fillStyle='rgba(180,220,210,0.7)';
  ctx.font=`bold ${Math.max(9,10*scale)}px monospace`;
  ctx.textAlign='center';
  ctx.fillText(t.label, cx, baseY+12);
  ctx.fillStyle='rgba(140,170,165,0.5)';
  ctx.font=`${Math.max(7,8*scale)}px monospace`;
  ctx.fillText(t.profile, cx, baseY+22);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawHills();
  drawTrees();
  TURBINES.forEach((t,i)=>drawTurbine(t,angles[i]));
}

function loop() {
  tick++;
  TURBINES.forEach((t,i)=>{
    let spd = 0;
    if(running){
      switch(t.profile){
        case 'Baseline':    spd=t.speed*(1+0.05*Math.sin(tick*0.03)); break;
        case 'High wind':   spd=t.speed*(1+0.4*Math.sin(tick*0.05))+0.5*Math.random(); break;
        case 'Pitch error': spd=t.speed*(1+0.3*Math.abs(Math.sin(tick*0.09))); break;
        case 'Aging':       spd=t.speed*(0.85+0.05*Math.sin(tick*0.02)); break;
        case 'Blind test':  spd=tick<3000?t.speed:(t.speed*(1+0.6*Math.sin(tick*0.1))+0.4*Math.random()); break;
      }
    }
    angles[i] += spd * 0.018;
  });

  draw();

  if(running && tick%15===0){
    TURBINES.forEach((t,i)=>{
      let rpm=1500,vib=0.9;
      switch(t.profile){
        case 'High wind':   rpm=1500+110*Math.sin(tick*0.04); vib=1.2+0.5*Math.abs(Math.sin(tick*0.06)); break;
        case 'Pitch error': rpm=1500+8*Math.sin(tick*0.05);  vib=1.6+0.8*Math.abs(Math.sin(tick*0.12)); break;
        case 'Aging':       rpm=1490+3*Math.sin(tick*0.02);  vib=0.9+Math.min(tick/10000,1.2); break;
        case 'Blind test':  rpm=tick<3000?1500:(1500+70*Math.sin(tick*0.09)); vib=tick<3000?0.9:(1.8+1.2*Math.abs(Math.sin(tick*0.11))); break;
      }
      document.getElementById('pr'+t.id).textContent=Math.round(rpm)+' RPM';
      document.getElementById('pv'+t.id).textContent='vib '+vib.toFixed(2)+'g';
      const pct=Math.min(100,((rpm-1200)/4));
      document.getElementById('pf'+t.id).style.width=pct.toFixed(1)+'%';
    });
  }

  raf=requestAnimationFrame(loop);
}

function buildPanel(){
  const pg=document.getElementById('pg');
  TURBINES.forEach(t=>{
    pg.innerHTML+=`<div class="pc"><div class="pn">${t.label} · ${t.profile}</div><div class="pr" id="pr${t.id}">— RPM</div><div class="pv" id="pv${t.id}">vib —g</div><div class="pb"><div class="pf" id="pf${t.id}" style="width:0%"></div></div></div>`;
  });
}

function startSim(){
  const gb=document.getElementById('gbtn'),pw=document.getElementById('pw'),pfb=document.getElementById('pfb'),st=document.getElementById('st');
  gb.disabled=true; pw.style.display='block'; running=true;
  let p=0;
  const msgs=['Simulating 1kHz physics...','Injecting harmonic variance...','Farm online.'];
  let mi=0;
  const iv=setInterval(()=>{
    p+=2; pfb.style.width=Math.min(p,100)+'%';
    const nm=Math.floor(p/35); if(nm!==mi&&msgs[nm]){mi=nm;st.textContent=msgs[nm];}
    if(p>=100){clearInterval(iv);st.textContent='Telemetry live · 5 turbines · 1kHz stream';document.getElementById('ebtn').style.display='inline-block';}
  },50);
  fetch('/generate').catch(()=>{});
}

function exportSim(){
  const eb=document.getElementById('ebtn'),st=document.getElementById('st');
  eb.disabled=true; eb.textContent='Exporting...';
  fetch('/store').catch(()=>{});
  setTimeout(()=>{eb.style.display='none';st.textContent='Files written · T5 ready for cloud upload.';},1200);
}

buildPanel();
loop();
</script>
